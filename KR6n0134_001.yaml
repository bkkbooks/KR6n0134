body:
  text: 明真可述前五識性境現量通三性此言前五識於三境中惟緣性境三量中惟是現量三性俱通性境者謂所緣諸色境不帶名言得境自相也相者青黃赤白之謂名者長短方圓之稱現量者謂對境親明不起分別也性境屬境現量屬心三性者善性惡性無記性也三性俱通以五識性非恆一故性境若説根塵能所八法而成是落小乘如惟識則無有此境此境現前如明鏡照象湛然明了不起分別如云真境也善惡兩性在五識雖無分別而照從是起故通眼耳身三二地居三界分為九地自地獄至六欲天皆欲界也為一地四禪色界也有四地四空無色界也有四地共為九地欲界名五趣雜居地五識俱全初禪天名離生喜樂地是為二地止有眼耳身三識無鼻舌二識以無段食故自三地以上則五識俱無遍行別境善十一中二大八貪嗔癡此二句言五識心所遍行有五別境有五善心所十一中隨煩惱二大隨煩惱八根本煩惱六今止有貪嗔癡三共心所三十四皆任運無分別者五識同依淨色根白淨色根者指勝義而言惟天眼能見蓋落形質者是浮塵根豈能照物以有勝義根在故能緣境言五個識同依勝義根而起也九緣七八好相鄰九緣者空明根境作意分別依染淨依根本依種子也眼識具九緣而生耳識惟從八除明緣故鼻舌身惟七除空明二緣故合三離二觀塵世鼻舌身三識合中取境眼耳二識離中取境觀即能緣見分塵世即所緣相分愚者難分識與根此言小乘愚法聲聞不知根之與識各有種子現行以為根識互生也不知根之種現但能導識之種現謂根為生識之緣則可謂生識則不可以識自有能生之種子故也小乘未破所知障於法不了故難分耳變相觀空唯後得果中猶自不詮真佛有根本智有後得智根本智乃實智能親緣真如後得智乃權智但能了俗不能親緣真如果頭佛已破見思惑能六根互用變起相分復觀相空以不知前五及七八等識遂自認為後得智不知後得智乃從根本智而得者小乘雖有如理如量二智特其名耳豈真後得智耶即後得智在佛果中猶不詮真況因中乎詮契也根本智無分別所以親緣真如後得智從色根起是有分別的所以不能親緣無分別理小乘以無我為真如斷了六識分別執便能六根互用以為能親緣真如偈曰小家果頭佛理量徒有名迷名不知義疑大而起諍五識同一覺是以眼可聞耳不能見色實非本根咎咎在分別者以故見思破六根即互用彼小不知此未究七八五三者曉然了橫計渠自破既破棄舊法悲哀歸大乘羅什首初師疑什亦有辨一朝悟大理仍復師羅什圓明初發成無漏三類分身息苦輪前五識隨八識轉佛位中第八識轉為無漏白淨識而相應心所即成大圓鏡智歘爾現前故云初發則前五識即成無漏三類身者法報化三身中之化身也千丈大化身被大乘四加行菩薩丈六小化身被大乘三資糧位菩薩及二乘凡夫隨類化身則三乘普被六趣均沾以止息衆生苦輪也前八句明有漏後四句明無漏第六識俱頌其造善作惡不定之功能三性三量通三境三界輪時易可知善惡無記三性現比非三量性獨影帶質三境俱通也比者比類而知非者情有理無比度不著也帶質境有二以心緣心中間相分從兩頭生帶本質生起名真帶質以心緣色中間相分惟從見分一頭生起變帶生起名似帶質獨影亦有二一有質獨影五根種現皆托質起一無質獨影緣空華兔角及過未等所變相分是五塵落謝影子止緣過去五塵與未來變起五塵影子不緣見在五塵也前生六識攬法塵影子以成今生形種今生又因形起影是來生受形種子今生若能六識作觀破了我執不攬法塵則不受分段身矣六識輪轉三界顯易可知相應心所五十一此句是標數性界二句是立名欲令衆生因名以闡義因義以會理會理以致用致用在作觀上説致用以體道體道以立德善惡臨時別配之六識遇善境時與善心所相應遇不善無記境時與不善無記心所相應故曰別配之此特平平緣耳若增上緣則善心勇猛惡心所俱轉而為善矣性界受三恆轉易六識於三性三界併憂喜苦樂捨五受恆常轉變改易也根隨信等總相連根本煩惱六隨煩惱二十善十一等餘遍行五別境五不定四共五十一亦相連性界受等轉易也動身發語獨為最動身發語時於八箇識中行相最勝以有情故也引滿能招業力牽引引起也滿圓滿也言六識能造業招果發起初心歡喜地歡喜地因斷分別我法故此識於初地初心轉成無漏以斷有分別我法二執故俱生猶自現纏眠無分別我法二執與生俱生此時尚未斷猶纏縛眠伏以所知障未斷故遠行地後純無漏觀察圓明照大千遠行乃第七地也此地以前漏無漏間雜而生至此地後則俱生二障永不現行而純無漏相應心所亦轉為妙觀察智而圓明照大千矣第七識帶質有覆通情本七識於三境中緣帶質境三性中惟有覆無記性有覆者障蔽真性通六識情故本八識也通情本故曰相分兩頭生七識緣八識見分為內自我七識是心本識亦是心所以説以心緣心真帶質八識是其本質故七識既以八識見分為內自我則八識見分即七識本位八識見分緣色即七識緣色也色非真故曰似帶質問帶質是帶八識本質而生了然如何是七識的境八識能藏一切所藏一切根身器界我愛執藏八識便有境了這境從何來是從六識來也便知七識原無體位其相分從六八兩頭而生隨緣執我量為非此識於無分別我法二執是任運綿綿故云隨緣執我八大遍行別境慧貪癡我見慢相隨大隨惟八遍行五別境止通慧根本煩惱止具四貪癡見慢是也恆審思量我相隨前五識非恆非審六識審而非恆惟此識恆常審推思察量度執八識見分為我故曰我相隨有情日夜鎮昏迷四惑八大相應起既執八識為內自我則有情恆處生死長夜而不自覺以與四惑八大相應而起四惑即根本煩惱四六轉呼為染淨依八個識俱為轉識惟六識作觀則諸識俱轉故轉獨加於六識呼七識為染淨之依蓋六識有分別七識無分別有分別依無分別起以無分別近無情故極喜初心平等性無功用行我恆摧凡一地中具初中後三心即入住出也此識於初地初心斷一分無明便轉成無滿為似平等性智以因中轉也無功用行是八地無分別我法二執至此盡斷故曰我恆摧乃為真平等性智矣六識到第八地轉妙觀察智如何七識初地初心就轉平等智耶蓋六識到觀成後轉妙觀察智初作觀時轉為似妙觀察智如來現起他受用十地菩薩所被機佛果位中現十種他受用身十地菩薩乃所被之機也第八識性惟無覆五遍行此識因中於三性中惟無覆無記性緣境之時相應心所惟五遍行界地隨他業力生此識於三界九地之中隨六識善惡業力而生以八識無記性故二乘不了因迷執由此能興論主諍此識最微細所以二乘愚法聲聞不信有此惟以前六識受熏持種斷了見思執為如理智六根互用執為如量智以無明全未破故所以大乘論主反覆辨論證有此識也浩浩三藏不可窮能持種子不失曰能藏受染淨等熏曰所藏七識執為我曰執藏三藏體用深廣故凡小不達淵深七浪境為風八識如澄湛之淵由前七個識攬前境為風興起波浪耳受薰持種根身器此識能受前染淨熏能持根身器界種子根是六根身為內世界器為外世界去後來先作主公惟此識為總報主不動地前才捨藏金剛道後異熟空第八地為不動地此識初至此地才捨能藏所藏執藏至金剛道後乃等覺位異熟者變異而熟異時而熟異類而熟金剛道後斷生相無明異熟種子方空也金剛觀智是智之名言其堅利能壞一切無明有生住異滅異熟空則瞥起一念無明空矣大圓無垢同時發普照十方塵剎中此識至佛果位中轉成上品無漏淨體號無垢識與相應大圓鏡智同發起時普照十方圓明世界唯識略解夫搜剔陰陽之奧囊括造化之精洞洪濛之源破渾沌之竅超儒老而獨高冠百氏而弘深舍唯識之宗而他求未之有也夫唯遮境有識簡心空遮境則識外無法簡空則非同枯滅是以夷斷常之坑塞生滅之路圓彰中道刊定因明魔外望絶凡聖共遵耳然識有八種有心王心所之殊苟非智慧空靈思量妙絶豈易窺其庭哉阿賴耶識等大略窮其所由生直以真如照極反昧生滅與不生滅和合謂之證自證分即如醒人忽爾昏作人語雖聞而不能了了謂之醒耶又不能了了謂之昏耶人語又聞此之謂昏醒相半迷悟之關也此等時節有人喚之則昏隨醒矣不喚則醒隨昏矣醒既隨昏而外不能了境又不作夢惟昏然而已謂之自證分此等時節位無能所冥然獨存也少頃頓夢種種悲歡苦樂據能觀而言謂之見分即所觀之所即相分或問曰見相二分前後生耶抗然生耶余應之曰見相二分謂之前後生者現量之中不許有無分別才生分別現量滅矣謂之抗生則能所弗同也此四分乃八識之本故有志於此宗者不可不留神焉四分通徹則八識之綱思過半矣夫八識四分乃相宗之綱骨也阿賴耶識末那識分別識眼耳鼻舌身五識謂之八識證自證分自證分見分相分謂之四分究本言之八識四分初無別體特以真如隨緣乃成種種耳夫真如隨緣之旨最難明了良以真如清淨初無薰染如何瞥起隨緣耶於此參之不已忽然悟入所謂八識四分不煩少檢唯識之書便能了了矣故曰性宗通而相宗不通則性宗所見猶未圓滿通相宗而不通性宗則相宗所見亦未精徹性相俱通而未悟達磨之禪則如葉公畫龍頭角望之非不宛然也欲其濟亢旱興雷雨斷不能焉是以有志於出世而荷擔法道若性若相若禪宗敢不竭誠而留神哉惟相宗名義數多若非心智妙密委曲精搜實未易明也今則取大略稍論而疏之但粗曉蒙孺耳大抵阿賴耶識通前眼耳鼻舌身五識當併而發揮之似覺易明蓋阿賴耶識及前五識皆屬現量又皆上品果中轉也若第七識第六識則三品皆具三品者見道為下品修道為中品究竟為上品故七六因中轉也或曰前五識成無漏相應心品現身益物何以先言第八成無漏耶以圓明初發乃第八識相應心品成大圓鏡智故其前五根即第八識所變相分能變本識既成無漏所變五根自當即成無漏矣能發五根既成無漏則所發五識遂成無漏何疑哉或曰既言八識轉成四智何故却言相應心品耶對曰唯識第十云此四品總攝佛地一切有為功德皆盡此轉有漏八識七識六識五識相應心品如次而得智雖非識而依識轉識為主故説識轉得又有漏位智劣識強無漏位中智強識劣為勸有情依智捨識故説轉識成智也大乘所緣緣義曰言是帶己相者帶與己相各有二義言帶有二義者一則挾帶即能緣心親挾境體而緣二則變帶即能緣心變起相分而緣也親挾者謂之實境變起者謂之假境假境者何即實境影子也影子者何謂前五識親挾實境乃任運而緣不帶名言現量中也譬諸明鏡物臨即照原無心也才覺妍醜現量已滅即落比量矣余是知假境影子意識所緣耳又能緣心變起相分而緣亦假境也今安慧宗中妄謂因中無漏五識能緣真如殊不知五識成智必待第八識轉而為根本智然後五識轉成所作智也此中目此智為後得者何也謂根本而後得也以五識及第八識皆屬現量果上同轉故也彼謂因中五識未轉智而能緣真如非妄而何縱於果上識雖轉智第能照俗而不能緣真如故護法師曰果中猶自不詮真況因中乎
